name: Deploy to Azure Static Web Apps

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: 4b7abae300c4b747222d910a3a0da14d796a710f84cdfefcbcb81d7deef1648c07-1eabcd0f-9fd6-4cd3-8fb6-7986967ccbb10101916099062510
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          output_location: /
